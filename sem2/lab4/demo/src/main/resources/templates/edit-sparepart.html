<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать запчасть</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 12px 25px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #27ae60; }
        .back-link { display: inline-block; margin-top: 15px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .flash-message { padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h1>Редактировать запчасть</h1>

    <!-- Flash сообщения -->
    <div th:if="${successMessage}" class="flash-message success">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="flash-message error">
        ❌ <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/spareparts/update/{id}(id=${part.id})}" method="post">
        <div>
            <label for="partName">Название запчасти *</label>
            <input type="text" id="partName" name="partName"
                   th:value="${part.partName}" required>
        </div>

        <div>
            <label for="partCost">Цена (руб.) *</label>
            <input type="number" id="partCost" name="partCost"
                   step="0.01" min="0"
                   th:value="${part.partCost}" required>
        </div>

        <div>
            <label for="quantityInStock">Количество на складе *</label>
            <input type="number" id="quantityInStock" name="quantityInStock"
                   min="0"
                   th:value="${part.quantityInStock}" required>
        </div>

        <button type="submit">Сохранить изменения</button>
    </form>

    <a th:href="@{/spareparts}" class="back-link">← Вернуться к списку запчастей</a>
</div>
</body>
</html>
