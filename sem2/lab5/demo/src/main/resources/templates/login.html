<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — TravelDream</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #2c3e50;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            text-decoration: none;
        }
        .header .logo span { color: #3498db; }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #34495e;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            background-color: #3498db;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .btn:hover { background-color: #2980b9; }
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-error { background-color: #f8d7da; border-left: 4px solid #e74c3c; }
        .alert-success { background-color: #d4edda; border-left: 4px solid #2ecc71; }
        .footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="header">
    <a href="/" th:href="@{/}" class="logo">Travel<span>Dream</span></a>
    <div class="nav-links">
        <a href="/" th:href="@{/}">Главная</a>
        <a href="/templates/tours" th:href="@{/tours}">Туры</a>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>Вход в систему</h1>
        <div th:if="${param.error}" class="alert alert-error">Неверный email или пароль</div>
        <div th:if="${param.logout}" class="alert alert-success">Вы вышли из системы</div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
        </p>
    </div>
</div>

<div class="footer">
    <p>© 2025 TravelDream Agency</p>
</div>
</body>
</html>
