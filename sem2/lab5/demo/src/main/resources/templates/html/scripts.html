<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<html xmlns:th="http://www.thymeleaf.org">

<!-- jQuery (optional) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/main.js}"></script>

<!-- Toast notifications -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/js/toastr.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">

<script>
    // Инициализация Toastr
    toastr.options = {
        "closeButton": true,
        "progressBar": true,
        "positionClass": "toast-top-right",
        "timeOut": "5000"
    };

    // Показать сообщения об успехе
    document.addEventListener('DOMContentLoaded', function() {
        // Проверка URL параметров для показа сообщений
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.has('success')) {
            toastr.success(decodeURIComponent(urlParams.get('success')));
        }

        if (urlParams.has('error')) {
            toastr.error(decodeURIComponent(urlParams.get('error')));
        }

        if (urlParams.has('warning')) {
            toastr.warning(decodeURIComponent(urlParams.get('warning')));
        }
    });
</script>
