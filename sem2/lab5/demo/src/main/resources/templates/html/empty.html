<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" />
    <title>В разработке</title>
    <link href='https://fonts.googleapis.com/css?family=Oswald' rel='stylesheet' type='text/css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
          background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
          color: #212529;
          width: 100vw;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          margin: 0;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
          text-align: center;
          max-width: 600px;
          padding: 2rem;
          background: white;
          border-radius: 10px;
          box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .glitch {
          font-size: 4rem;
          font-weight: bold;
          text-transform: uppercase;
          position: relative;
          text-shadow: 0.05em 0 0 #0d6efd, -0.03em -0.04em 0 #dc3545,
            0.025em 0.04em 0 #ffc107;
          animation: glitch 725ms infinite;
          margin-bottom: 2rem;
        }

        .glitch span {
          position: absolute;
          top: 0;
          left: 0;
        }

        .glitch span:first-child {
          animation: glitch 500ms infinite;
          clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
          transform: translate(-0.04em, -0.03em);
          opacity: 0.75;
        }

        .glitch span:last-child {
          animation: glitch 375ms infinite;
          clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
          transform: translate(0.04em, 0.03em);
          opacity: 0.75;
        }

        @keyframes glitch {
          0% {
            text-shadow: 0.05em 0 0 #0d6efd, -0.03em -0.04em 0 #dc3545,
              0.025em 0.04em 0 #ffc107;
          }
          15% {
            text-shadow: 0.05em 0 0 #0d6efd, -0.03em -0.04em 0 #dc3545,
              0.025em 0.04em 0 #ffc107;
          }
          16% {
            text-shadow: -0.05em -0.025em 0 #0d6efd, 0.025em 0.035em 0 #dc3545,
              -0.05em -0.05em 0 #ffc107;
          }
          49% {
            text-shadow: -0.05em -0.025em 0 #0d6efd, 0.025em 0.035em 0 #dc3545,
              -0.05em -0.05em 0 #ffc107;
          }
          50% {
            text-shadow: 0.05em 0.035em 0 #0d6efd, 0.03em 0 0 #dc3545,
              0 -0.04em 0 #ffc107;
          }
          99% {
            text-shadow: 0.05em 0.035em 0 #0d6efd, 0.03em 0 0 #dc3545,
              0 -0.04em 0 #ffc107;
          }
          100% {
            text-shadow: -0.05em 0 0 #0d6efd, -0.025em -0.04em 0 #dc3545,
              -0.04em -0.025em 0 #ffc107;
          }
        }

        .message {
          font-size: 1.25rem;
          color: #495057;
          margin-bottom: 2rem;
          line-height: 1.6;
        }

        .btn-return {
          background: #0d6efd;
          color: white;
          padding: 0.75rem 2rem;
          border-radius: 5px;
          text-decoration: none;
          font-weight: 500;
          transition: all 0.3s ease;
          border: none;
          font-size: 1rem;
        }

        .btn-return:hover {
          background: #0b5ed7;
          color: white;
          transform: translateY(-2px);
          box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glitch">
        <span aria-hidden="true">Упс... 404! ¯\_(ツ)_/¯</span>
        Упс... 404! ¯\_(ツ)_/¯
        <span aria-hidden="true">¯Упс... 404! ¯\_(ツ)_/¯</span>
    </div>

    <div class="message">
        <h4 class="mb-3">Страница в разработке</h4>
        <p class="mb-0">Функционал будет доступен в следующем обновлении</p>
    </div>

    <a href="/client/dashboard" class="btn-return">
        Вернуться в личный кабинет
    </a>
</div>
</body>
</html>
