<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — TravelDream</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #2c3e50;
        }
        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            text-decoration: none;
        }
        .header .logo span { color: #3498db; }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #34495e;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .nav-links a:hover { background-color: #ecf0f1; }
        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .form-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 200px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            background-color: #3498db;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background-color: #2980b9; }
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-error { background-color: #f8d7da; border-left: 4px solid #e74c3c; }
        .footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        .footer a { color: #ecf0f1; text-decoration: none; }
    </style>
</head>
<body>
<div class="header">
    <a href="/" th:href="@{/}" class="logo">Travel<span>Dream</span></a>
    <div class="nav-links">
        <a href="/" th:href="@{/}">Главная</a>
        <a href="/templates/tours" th:href="@{/tours}">Туры</a>
        <a th:href="@{/login}">Вход</a>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>Регистрация</h1>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${client}">
            <div class="form-row">
                <div class="form-group">
                    <label>Фамилия *</label>
                    <input type="text" th:field="*{lastName}" required>
                </div>
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" th:field="*{firstName}" required>
                </div>
            </div>
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" th:field="*{patronymic}">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" th:field="*{phone}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" th:field="*{passwordHash}" minlength="6" required>
                </div>
                <div class="form-group">
                    <label>Подтверждение *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="agreeTerms" required>
                    Я согласен с <a href="#">условиями использования</a>
                </label>
            </div>
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
        </p>
    </div>
</div>

<div class="footer">
    <p>© 2025 TravelDream Agency. Все права защищены.</p>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');
        function validate() {
            if (password.value !== confirm.value) {
                confirm.setCustomValidity('Пароли не совпадают');
            } else {
                confirm.setCustomValidity('');
            }
        }
        password.addEventListener('change', validate);
        confirm.addEventListener('keyup', validate);
    });
</script>
</body>
</html>
