<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать сотрудника</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* Flash сообщения */
        .flash-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border-color: #2ecc71;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #e74c3c;
        }

        /* Форма */
        form > div {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #34495e;
            outline: none;
        }

        input:required, select:required {
            border-left: 3px solid #2ecc71;
        }

        .password-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border: 2px dashed #e0e0e0;
        }

        .password-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 1.1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .back-link:hover {
            background-color: #f8f9fa;
            text-decoration: underline;
        }

        /* Информация о сотруднике */
        .employee-info {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #34495e;
        }

        .employee-info p {
            margin: 5px 0;
            color: #555;
        }

        .employee-info strong {
            color: #2c3e50;
        }

        .role-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            background-color: #34495e;
            color: white;
        }

        /* Стили для select */
        select {
            background-color: white;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }

        select:hover {
            border-color: #34495e;
        }

        select:focus {
            outline: none;
            border-color: #34495e;
            box-shadow: 0 0 0 2px rgba(52, 73, 94, 0.2);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Редактировать сотрудника</h1>

    <!-- Информация о сотруднике -->
    <div class="employee-info" th:if="${employee}">
        <p><strong>ID:</strong> <span th:text="${employee.id}"></span></p>
        <p><strong>Текущие данные:</strong>
            <span th:text="${employee.lastName} + ' ' + ${employee.firstName} +
                           (${employee.patronymic} ? ' ' + ${employee.patronymic} : '')"></span>
        </p>
        <p><strong>Должность:</strong> <span th:text="${employee.jobTitle}"></span></p>
        <p><strong>Роль:</strong>
            <span class="role-badge" th:text="${employee.role?.roleName}"></span>
        </p>
        <p th:if="${employee.email}"><strong>Email:</strong> <span th:text="${employee.email}"></span></p>
        <p th:if="${employee.phone}"><strong>Телефон:</strong> <span th:text="${employee.phone}"></span></p>
    </div>

    <!-- Flash сообщения -->
    <div th:if="${successMessage}" class="flash-message success">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="flash-message error">
        ❌ <span th:text="${errorMessage}"></span>
    </div>

    <!-- ФОРМА БЕЗ th:object - простые поля с th:value -->
    <form th:action="@{/employees/update/{id}(id=${employee.id})}" method="post">
        <div>
            <label for="lastName">Фамилия *</label>
            <input type="text" id="lastName" name="lastName"
                   th:value="${employee.lastName}"
                   placeholder="Введите фамилию" required>
        </div>

        <div>
            <label for="firstName">Имя *</label>
            <input type="text" id="firstName" name="firstName"
                   th:value="${employee.firstName}"
                   placeholder="Введите имя" required>
        </div>

        <div>
            <label for="patronymic">Отчество</label>
            <input type="text" id="patronymic" name="patronymic"
                   th:value="${employee.patronymic}"
                   placeholder="Введите отчество (если есть)">
        </div>

        <div>
            <label for="email">Email *</label>
            <input type="email" id="email" name="email"
                   th:value="${employee.email}"
                   placeholder="email@example.com" required>
        </div>

        <div>
            <label for="phone">Телефон</label>
            <input type="text" id="phone" name="phone"
                   th:value="${employee.phone}"
                   placeholder="+7 (XXX) XXX-XX-XX">
        </div>

        <div>
            <label for="jobTitle">Должность *</label>
            <input type="text" id="jobTitle" name="jobTitle"
                   th:value="${employee.jobTitle}"
                   placeholder="Например: Менеджер по продажам" required>
        </div>

        <div>
            <label for="roleId">Роль *</label>
            <select id="roleId" name="roleId" required>
                <option value="">Выберите роль</option>
                <option th:each="role : ${roles}"
                        th:value="${role.id}"
                        th:text="${role.roleName}"
                        th:selected="${employee.role?.id == role.id}"></option>
            </select>
        </div>

        <!-- Секция изменения пароля -->
        <div class="password-section">
            <h3>Изменение пароля</h3>
            <div class="checkbox-group">
                <input type="checkbox" id="changePassword" name="changePassword" th:checked="${changePassword}">
                <label for="changePassword">Изменить пароль</label>
            </div>
            <div id="passwordFields" th:style="${changePassword} ? 'display: block;' : 'display: none;'">
                <div style="margin-bottom: 15px;">
                    <label for="newPassword">Новый пароль</label>
                    <input type="password" id="newPassword" name="newPassword"
                           th:value="${newPassword}"
                           placeholder="Введите новый пароль">
                </div>
                <div>
                    <label for="confirmPassword">Подтверждение пароля</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           th:value="${confirmPassword}"
                           placeholder="Повторите новый пароль">
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button type="submit" style="flex: 2;">Сохранить изменения</button>
            <a th:href="@{/employees}" class="back-link" style="flex: 1; text-align: center;">Отмена</a>
        </div>
    </form>

    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
        <small style="color: #7f8c8d;">
            * Поля, обязательные для заполнения<br>
            Пароль изменяется только при установке галочки "Изменить пароль"
        </small>
    </div>
</div>

<script>
    // Показать/скрыть поля пароля
    document.getElementById('changePassword').addEventListener('change', function() {
        var passwordFields = document.getElementById('passwordFields');
        passwordFields.style.display = this.checked ? 'block' : 'none';
    });
</script>
</body>
</html>
