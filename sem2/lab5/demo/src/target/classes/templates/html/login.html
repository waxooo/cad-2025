<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему — Автосервис</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .login-header p {
            color: #7f8c8d;
            margin: 0;
        }

        .message-container {
            margin-bottom: 20px;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2ecc71;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-form {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #3498db;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .link-btn {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .link-btn:hover {
            background-color: #f8f9fa;
            text-decoration: underline;
        }

        .system-info {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-align: center;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 25px;
            }

            .links {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">

    <div th:if="${param.registerSuccess}" class="alert alert-success">
        Регистрация прошла успешно! Теперь вы можете войти в систему.
    </div>

    <div class="login-header">
        <h1>🔑 Вход в систему</h1>
        <p>Автосервис "JavaCarService"</p>
    </div>

    <div class="message-container">
        <div th:if="${errorMessage}" class="error-message">
            ❌ <span th:text="${errorMessage}">Сообщение об ошибке</span>
        </div>

        <div th:if="${successMessage}" class="success-message">
            ✅ <span th:text="${successMessage}">Успешное сообщение</span>
        </div>
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
        <div class="form-group">
            <label for="username">Email:</label>
            <input type="email" id="username" name="username"
                   th:value="${username}" required autofocus
                   placeholder="Введите ваш email">
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password"
                   required placeholder="Введите ваш пароль">
        </div>

        <button type="submit" class="login-btn">Войти в систему</button>
    </form>

    <div class="links">
        <a href="/register" th:href="@{/register}" class="link-btn">📝 Регистрация клиента</a>
        <a href="/" th:href="@{/}" class="link-btn">🏠 На главную</a>
    </div>

    <div class="system-info">
        Система аутентификации | Версия 2.0
    </div>
</div>
</body>
</html>
