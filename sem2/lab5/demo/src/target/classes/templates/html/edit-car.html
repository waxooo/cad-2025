<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать автомобиль</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* Flash сообщения */
        .flash-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border-color: #2ecc71;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #e74c3c;
        }

        /* Форма */
        form > div {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #f39c12;
            outline: none;
        }

        input:required, select:required {
            border-left: 3px solid #2ecc71;
        }

        .license-plate-preview {
            display: inline-block;
            padding: 8px 12px;
            background-color: #2c3e50;
            color: white;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .back-link:hover {
            background-color: #f8f9fa;
            text-decoration: underline;
        }

        /* Информация об автомобиле */
        .car-info {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #f39c12;
        }

        .car-info p {
            margin: 5px 0;
            color: #555;
        }

        .car-info strong {
            color: #2c3e50;
        }

        .car-model {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .car-details {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .car-details > div {
            flex: 1;
        }

        /* Стили для select */
        select {
            background-color: white;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }

        select:hover {
            border-color: #f39c12;
        }

        select:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 2px rgba(243, 156, 18, 0.2);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 25px;
            }

            .car-details {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Редактировать автомобиль</h1>

    <!-- Информация об автомобиле -->
    <div class="car-info" th:if="${car}">
        <p><strong>ID:</strong> <span th:text="${car.id}"></span></p>
        <p class="car-model">
            <span th:text="${car.brand}"></span>
            <span th:text="${car.model}"></span>
        </p>
        <div class="car-details">
            <div>
                <p><strong>Гос. номер:</strong>
                    <span class="license-plate-preview" th:text="${car.licensePlate}"></span>
                </p>
                <p th:if="${car.yearOfManufacture}">
                    <strong>Год выпуска:</strong> <span th:text="${car.yearOfManufacture}"></span>
                </p>
            </div>
            <div>
                <p th:if="${car.vin}"><strong>VIN:</strong>
                    <span style="font-family: monospace;" th:text="${car.vin}"></span>
                </p>
                <p><strong>Владелец:</strong>
                    <span th:text="${car.client?.lastName} + ' ' + ${car.client?.firstName}"></span>
                </p>
            </div>
        </div>
    </div>

    <!-- Flash сообщения -->
    <div th:if="${successMessage}" class="flash-message success">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="flash-message error">
        ❌ <span th:text="${errorMessage}"></span>
    </div>

    <!-- Простая форма -->
    <form th:action="@{/cars/update/{id}(id=${car.id})}" method="post">
        <div>
            <label for="clientId">Владелец (клиент) *</label>
            <select id="clientId" name="clientId" required>
                <option value="">Выберите клиента</option>
                <option th:each="client : ${clients}"
                        th:value="${client.id}"
                        th:text="${client.lastName} + ' ' + ${client.firstName} + (${client.patronymic} ? ' ' + ${client.patronymic} : '')"
                        th:selected="${car.client?.id == client.id}"></option>
            </select>
        </div>

        <div>
            <label for="brand">Марка *</label>
            <input type="text" id="brand" name="brand"
                   th:value="${car.brand}"
                   placeholder="Toyota" required>
        </div>

        <div>
            <label for="model">Модель *</label>
            <input type="text" id="model" name="model"
                   th:value="${car.model}"
                   placeholder="Camry" required>
        </div>

        <div>
            <label for="licensePlate">Гос. номер *</label>
            <input type="text" id="licensePlate" name="licensePlate"
                   th:value="${car.licensePlate}"
                   placeholder="А123БВ77" required>
            <div id="licensePlatePreview" class="license-plate-preview"
                 style="display: none; margin-top: 5px;"></div>
        </div>

        <div>
            <label for="vin">VIN номер (17 символов)</label>
            <input type="text" id="vin" name="vin"
                   th:value="${car.vin}"
                   placeholder="1HGCM82633A123456" maxlength="17">
        </div>

        <div>
            <label for="yearOfManufacture">Год выпуска</label>
            <input type="number" id="yearOfManufacture" name="yearOfManufacture"
                   th:value="${car.yearOfManufacture}"
                   placeholder="2020" min="1900" max="2100">
        </div>

        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button type="submit" style="flex: 2;">Сохранить изменения</button>
            <a th:href="@{/cars}" class="back-link" style="flex: 1; text-align: center;">Отмена</a>
        </div>
    </form>

    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
        <small style="color: #7f8c8d;">
            * Поля, обязательные для заполнения<br>
            Формат гос. номера: А123БВ77 или A123BC77<br>
            VIN должен содержать 17 символов (буквы и цифры)
        </small>
    </div>
</div>

<script>
    // Превью гос. номера
    const licensePlateInput = document.getElementById('licensePlate');
    const licensePlatePreview = document.getElementById('licensePlatePreview');
    const form = document.querySelector('form');

    // Функция для автоматического форматирования госномера
    function formatLicensePlate(value) {
        return value.toUpperCase().replace(/[^АВЕКМНОРСТУХA-Z0-9]/g, '');
    }

    // Функция проверки формата госномера
    function validateLicensePlate(plate) {
        // Русские и латинские буквы, разрешенные в РФ
        const regex = /^[АВЕКМНОРСТУХA-Z]\d{3}[АВЕКМНОРСТУХA-Z]{2}\d{2,3}$/;
        return regex.test(plate);
    }

    // Обновление превью и форматирование при вводе
    licensePlateInput.addEventListener('input', function() {
        // Форматируем значение (убираем недопустимые символы, делаем заглавными)
        const formattedValue = formatLicensePlate(this.value);
        if (formattedValue !== this.value) {
            this.value = formattedValue;
        }

        // Обновляем превью
        if (this.value.trim() !== '') {
            licensePlatePreview.textContent = this.value;
            licensePlatePreview.style.display = 'inline-block';

            // Проверяем валидность и меняем цвет превью
            if (validateLicensePlate(this.value)) {
                licensePlatePreview.style.backgroundColor = '#2ecc71'; // зеленый
            } else {
                licensePlatePreview.style.backgroundColor = '#e74c3c'; // красный
            }
        } else {
            licensePlatePreview.style.display = 'none';
        }
    });

    // Проверка при потере фокуса
    licensePlateInput.addEventListener('blur', function() {
        const plateValue = this.value.trim();

        if (plateValue && !validateLicensePlate(plateValue)) {
            // Не очищаем поле, показываем подсказку
            licensePlatePreview.style.backgroundColor = '#e74c3c';

            // Добавляем подсказку
            if (!document.getElementById('plateHint')) {
                const hint = document.createElement('div');
                hint.id = 'plateHint';
                hint.style.color = '#e74c3c';
                hint.style.fontSize = '0.85rem';
                hint.style.marginTop = '5px';
                hint.innerHTML = 'Формат: А123БВ77 или A123BC77<br>Примеры: А123ВС77, Х999КХ177, B123CD123';
                this.parentNode.appendChild(hint);
            }
        } else if (document.getElementById('plateHint')) {
            // Убираем подсказку если она есть
            document.getElementById('plateHint').remove();
        }
    });

    // Фокусируемся обратно при клике на превью
    licensePlatePreview.addEventListener('click', function() {
        licensePlateInput.focus();
    });

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        // Инициализация превью
        if (licensePlateInput.value.trim() !== '') {
            const formattedValue = formatLicensePlate(licensePlateInput.value);
            licensePlateInput.value = formattedValue;
            licensePlatePreview.textContent = formattedValue;
            licensePlatePreview.style.display = 'inline-block';

            if (validateLicensePlate(formattedValue)) {
                licensePlatePreview.style.backgroundColor = '#2ecc71';
            } else {
                licensePlatePreview.style.backgroundColor = '#e74c3c';
            }
        }

        // Проверка при отправке формы
        form.addEventListener('submit', function(e) {
            const plateValue = licensePlateInput.value.trim();

            if (!plateValue) {
                e.preventDefault();
                alert('Гос. номер обязателен для заполнения!');
                licensePlateInput.focus();
                return false;
            }

            if (!validateLicensePlate(plateValue)) {
                e.preventDefault();
                alert('Некорректный формат гос. номера!\n\nПравильный формат:\n• Первая буква: А, В, Е, К, М, Н, О, Р, С, Т, У, Х или A-Z\n• Три цифры\n• Две буквы\n• Две или три цифры\n\nПримеры: А123БВ77, Х999КХ177, B123CD123');
                licensePlateInput.focus();
                return false;
            }

            // Гарантируем, что номер в верхнем регистре
            licensePlateInput.value = plateValue.toUpperCase();

            return true;
        });
    });

    // Автоматическое форматирование VIN в верхний регистр
    const vinInput = document.getElementById('vin');
    if (vinInput) {
        vinInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, '');

            // Ограничение 17 символов
            if (this.value.length > 17) {
                this.value = this.value.substring(0, 17);
            }
        });

        // Проверка VIN при потере фокуса
        vinInput.addEventListener('blur', function() {
            const vinValue = this.value.trim();
            if (vinValue && vinValue.length !== 17) {
                if (!document.getElementById('vinHint')) {
                    const hint = document.createElement('div');
                    hint.id = 'vinHint';
                    hint.style.color = '#e74c3c';
                    hint.style.fontSize = '0.85rem';
                    hint.style.marginTop = '5px';
                    hint.textContent = 'VIN должен содержать ровно 17 символов';
                    this.parentNode.appendChild(hint);
                }
            } else if (document.getElementById('vinHint')) {
                document.getElementById('vinHint').remove();
            }
        });
    }
</script>
</body>
</html>
